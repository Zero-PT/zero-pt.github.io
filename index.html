<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zero | 网络安全学习笔记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 亮色模式变量 */
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --tag-bg: #eef2ff;
            --tag-text: #1e40af;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
        }

        /* 暗色模式变量 */
        [data-theme="dark"] {
            --bg-body: #0b1120;
            --bg-surface: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --tag-bg: #2d3a5e;
            --tag-text: #a5f3fc;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans', sans-serif;
            line-height: 1.6;
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .blog-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .theme-toggle {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* 简介区 */
        .hero {
            background: var(--bg-surface);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .hero h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .hero p {
            color: var(--text-secondary);
        }

        /* 标签筛选栏 */
        .tags-filter {
            background: var(--bg-surface);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }
        .filter-title {
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .tag-btn {
            background: var(--tag-bg);
            color: var(--tag-text);
            border: none;
            padding: 0.3rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tag-btn.active {
            background: var(--accent);
            color: white;
        }
        .tag-btn:hover {
            transform: translateY(-1px);
            filter: brightness(0.95);
        }

        /* 文章列表 */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .post-card {
            background: var(--bg-surface);
            border-radius: 1.25rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.25s;
            box-shadow: var(--shadow);
        }
        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.2);
        }
        .post-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .post-title a {
            text-decoration: none;
            color: var(--text-primary);
        }
        .post-title a:hover {
            color: var(--accent);
        }
        .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .post-tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .post-excerpt {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        .read-more {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .read-more:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            .post-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="blog-title">📖 Zero | 网络安全学习笔记</div>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙 暗色</button>
    </div>

    <div class="hero">
        <h2>🛡️ 知识库 · 学习资料聚合</h2>
        <p>Web安全 · 渗透测试 · CTF · 工具使用 · 学习路线 · 漏洞复现。持续更新，欢迎交流。</p>
    </div>

    <!-- 标签筛选栏 -->
    <div class="tags-filter">
        <div class="filter-title">🏷️ 分类筛选（点击标签过滤）</div>
        <div class="tag-list" id="filterTags"></div>
    </div>

    <!-- 文章列表容器 -->
    <div id="postsContainer" class="post-list"></div>

    <footer>
        <p>© 2026 Zero · 基于 GitHub Pages 搭建 · 内容仅供学习参考</p>
    </footer>
</div>

<script>
    // ---------- 博客文章数据（扩充学习资料类标签）----------
    const articles = [
        {
            title: "网络安全学习路线（2026版）从入门到就业",
            date: "2026-05-20",
            tags: ["学习路线", "入门", "就业"],
            excerpt: "一份完整的自学路线图：基础网络、Linux、Web安全、渗透测试、内网渗透、代码审计…",
            link: "#"
        },
        {
            title: "Burp Suite 实战：从配置到自动化扫描",
            date: "2026-05-18",
            tags: ["工具推荐", "Web安全", "渗透测试"],
            excerpt: "代理配置、Repeater、Intruder、Scanner 插件的使用技巧，提升挖洞效率。",
            link: "#"
        },
        {
            title: "SQL 注入漏洞详解（MySQL版）",
            date: "2026-05-15",
            tags: ["漏洞分析", "SQL注入", "Web安全"],
            excerpt: "联合查询、报错注入、布尔盲注、时间盲注，以及宽字节注入绕过。",
            link: "#"
        },
        {
            title: "Vulhub 靶场搭建与实战：复现常见漏洞",
            date: "2026-05-12",
            tags: ["实战靶场", "漏洞复现", "环境搭建"],
            excerpt: "利用 Docker 一键搭建漏洞环境，复现 Struts2、Log4j2 等经典漏洞。",
            link: "#"
        },
        {
            title: "CTF Web 入门：10道经典题目解析",
            date: "2026-05-10",
            tags: ["CTF技巧", "Web安全", "入门"],
            excerpt: "包含文件包含、命令执行、上传绕过、SSRF 等常见题型思路。",
            link: "#"
        },
        {
            title: "Nmap 高级扫描：绕过防火墙与隐蔽扫描",
            date: "2026-05-07",
            tags: ["工具推荐", "信息收集", "渗透测试"],
            excerpt: "使用分片扫描、诱饵扫描、随机代理等技巧，降低被封锁风险。",
            link: "#"
        },
        {
            title: "内网渗透初探：信息收集与横向移动",
            date: "2026-05-04",
            tags: ["内网安全", "渗透测试", "学习路线"],
            excerpt: "域环境识别、端口转发、PsExec、WMI 横向移动基础。",
            link: "#"
        },
        {
            title: "XSS 漏洞从零到一：三种类型与防御",
            date: "2026-05-01",
            tags: ["漏洞分析", "Web安全", "入门"],
            excerpt: "反射型、存储型、DOM 型 XSS 的利用与绕过，以及 CSP 策略。",
            link: "#"
        }
    ];

    // 提取所有不重复的标签
    function getAllTags() {
        const tagsSet = new Set();
        articles.forEach(article => {
            article.tags.forEach(tag => tagsSet.add(tag));
        });
        return Array.from(tagsSet).sort();
    }

    // 根据选中的标签筛选文章
    let activeTag = "全部";

    function filterArticlesByTag(tag) {
        if (tag === "全部") return articles;
        return articles.filter(article => article.tags.includes(tag));
    }

    // 渲染文章列表
    function renderPosts(tag) {
        const filtered = filterArticlesByTag(tag);
        const container = document.getElementById("postsContainer");
        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align: center; padding: 2rem; color: var(--text-muted);">暂无该分类下的文章，稍后更新～</div>`;
            return;
        }

        container.innerHTML = filtered.map(article => `
            <article class="post-card">
                <div class="post-title">
                    <a href="${article.link}">${article.title}</a>
                </div>
                <div class="post-meta">
                    <span>📅 ${article.date}</span>
                </div>
                <div class="post-tags">
                    ${article.tags.map(tag => `<span class="post-tag">#${tag}</span>`).join('')}
                </div>
                <div class="post-excerpt">${article.excerpt}</div>
                <a href="${article.link}" class="read-more">阅读笔记 →</a>
            </article>
        `).join('');
    }

    // 渲染标签筛选按钮
    function renderFilterTags() {
        const allTags = getAllTags();
        const filterContainer = document.getElementById("filterTags");
        const buttonsHtml = [
            `<button class="tag-btn ${activeTag === "全部" ? "active" : ""}" data-tag="全部">全部</button>`,
            ...allTags.map(tag => `<button class="tag-btn ${activeTag === tag ? "active" : ""}" data-tag="${tag}">${tag}</button>`)
        ].join('');
        filterContainer.innerHTML = buttonsHtml;

        // 绑定事件
        document.querySelectorAll('.tag-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tag = btn.dataset.tag;
                activeTag = tag;
                renderFilterTags();      // 重新渲染按钮以更新active样式
                renderPosts(activeTag);
            });
        });
    }

    // ---------- 主题切换 (亮色/暗色) ----------
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        updateToggleButtonText(theme);
    }

    function updateToggleButtonText(theme) {
        const btn = document.getElementById('themeToggle');
        if (theme === 'dark') {
            btn.innerHTML = '☀️ 亮色';
        } else {
            btn.innerHTML = '🌙 暗色';
        }
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateToggleButtonText(newTheme);
    }

    // 初始化页面
    function init() {
        initTheme();
        renderFilterTags();
        renderPosts(activeTag);
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    }

    init();
</script>
</body>
</html>
